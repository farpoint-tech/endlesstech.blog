<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="The four Microsoft 365 Zero Trust pillars — Identity, Devices, Apps, and Data — with the Apps pillar highlighted, aligned to Microsoft Secure Score">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#071633"/><stop offset="1" stop-color="#002863"/></linearGradient></defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <g stroke="#3366FF" stroke-opacity="0.08" stroke-width="1"><path d="M0 168H1200M0 336H1200M0 504H1200"/><path d="M240 0V675M480 0V675M720 0V675M960 0V675"/></g>
  <text x="600" y="90" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="3" fill="#00D9FF">ZERO TRUST FOR MICROSOFT 365</text>
