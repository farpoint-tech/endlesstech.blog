<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Two recycle bins labeled first stage and second stage with files flowing between them along a 93-day timeline, both still drawing on a storage meter">
  <defs>
    <linearGradient id="r-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#071633"/><stop offset="1" stop-color="#002863"/></linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#r-bg)"/>
  <g stroke="#3366FF" stroke-opacity="0.08" stroke-width="1"><path d="M0 135H1200M0 270H1200M0 405H1200M0 540H1200"/></g>

  <!-- bins -->
  <g font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">
    <!-- bin 1 -->
    <g transform="translate(280 210)">
      <rect x="-70" y="-14" width="140" height="20" rx="6" fill="#00D9FF"/>
      <rect x="-20" y="-30" width="40" height="16" rx="5" fill="#00D9FF"/>
      <path d="M-58 8 L-46 150 H46 L58 8 Z" fill="#0e2a5c" stroke="#00D9FF" stroke-width="2.5"/>
      <g stroke="#00D9FF" stroke-opacity="0.5" stroke-width="3"><path d="M-28 30 V128"/><path d="M0 30 V128"/><path d="M28 30 V128"/></g>
      <text x="0" y="192" fill="#eaf2ff" font-size="17" font-weight="700">First stage</text>
      <text x="0" y="214" fill="#9db8ff" font-size="13">site recycle bin</text>
    </g>
    <!-- bin 2 -->
    <g transform="translate(700 210)">
      <rect x="-70" y="-14" width="140" height="20" rx="6" fill="#3366FF"/>
      <rect x="-20" y="-30" width="40" height="16" rx="5" fill="#3366FF"/>
      <path d="M-58 8 L-46 150 H46 L58 8 Z" fill="#0e2a5c" stroke="#3366FF" stroke-width="2.5"/>
      <g stroke="#3366FF" stroke-opacity="0.6" stroke-width="3"><path d="M-28 30 V128"/><path d="M0 30 V128"/><path d="M28 30 V128"/></g>
      <text x="0" y="192" fill="#eaf2ff" font-size="17" font-weight="700">Second stage</text>
      <text x="0" y="214" fill="#9db8ff" font-size="13">site collection recycle bin</text>
    </g>

    <!-- file flowing between -->
    <g fill="none" stroke="#00D9FF" stroke-opacity="0.55" stroke-width="3" stroke-dasharray="6 8" stroke-linecap="round"><path d="M355 250 C 450 210, 560 210, 640 250"/></g>
    <g transform="translate(500 205) rotate(-6)"><path d="M-16 -20 H10 L22 -8 V22 H-16 Z" fill="#eaf2ff"/><path d="M10 -20 V-8 H22 Z" fill="#8fb0ee"/></g>
  </g>

  <!-- 93-day timeline -->
  <g font-family="Segoe UI, Arial, sans-serif">
    <line x1="220" y1="470" x2="760" y2="470" stroke="#ECC23B" stroke-width="3"/>
    <polygon points="760,470 748,463 748,477" fill="#ECC23B"/>
    <circle cx="220" cy="470" r="6" fill="#00D9FF"/><circle cx="490" cy="470" r="6" fill="#3366FF"/>
    <text x="220" y="500" fill="#9db8ff" font-size="14" text-anchor="middle">delete</text>
    <text x="760" y="500" fill="#ECC23B" font-size="15" text-anchor="end" font-weight="700">93 days → auto-purge</text>
    <text x="490" y="446" fill="#c7d6ff" font-size="14" text-anchor="middle">still counts against quota</text>
  </g>

  <!-- storage meter still connected -->
  <g transform="translate(980 230)" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">
    <rect x="-90" y="-30" width="180" height="220" rx="16" fill="#0b1f47" stroke="#FF4D6D" stroke-width="2"/>
    <text x="0" y="0" fill="#eaf2ff" font-size="15" font-weight="700">Storage meter</text>
    <rect x="-40" y="20" width="80" height="150" rx="10" fill="#04102a" stroke="#22335f"/>
    <rect x="-40" y="70" width="80" height="100" rx="10" fill="#FF4D6D" fill-opacity="0.75"/>
    <text x="0" y="130" fill="#fff" font-size="14" font-weight="800">held</text>
  </g>
  <g fill="none" stroke="#FF4D6D" stroke-opacity="0.5" stroke-width="2.5" stroke-dasharray="4 6">
    <path d="M340 260 C 700 360, 820 300, 890 300"/>
    <path d="M760 260 C 830 300, 850 300, 890 320"/>
  </g>
</svg>
