<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="A hidden vault door behind a normal SharePoint library revealing the Preservation Hold Library stuffed with deleted and modified file copies, with a retention policy control panel above it">
  <defs>
    <linearGradient id="ph-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#071633"/><stop offset="1" stop-color="#002863"/></linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#ph-bg)"/>
  <g stroke="#3366FF" stroke-opacity="0.08" stroke-width="1"><path d="M0 135H1200M0 270H1200M0 405H1200M0 540H1200"/></g>

  <!-- retention policy control panel -->
  <g font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">
    <rect x="360" y="70" width="480" height="120" rx="14" fill="#0b1f47" stroke="#00D9FF" stroke-width="2"/>
    <text x="600" y="104" fill="#eaf2ff" font-size="18" font-weight="700">Retention policy</text>
    <!-- two dials -->
    <g transform="translate(480 150)">
      <circle cx="0" cy="0" r="26" fill="none" stroke="#22335f" stroke-width="7"/>
      <path d="M0 -26 A26 26 0 0 1 22 13" fill="none" stroke="#00D9FF" stroke-width="7" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="14" y2="-16" stroke="#00D9FF" stroke-width="4" stroke-linecap="round"/>
      <text x="0" y="46" fill="#9db8ff" font-size="13">retain</text>
    </g>
    <g transform="translate(720 150)">
      <circle cx="0" cy="0" r="26" fill="none" stroke="#22335f" stroke-width="7"/>
      <path d="M0 -26 A26 26 0 0 1 -22 13" fill="none" stroke="#ECC23B" stroke-width="7" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="-14" y2="-16" stroke="#ECC23B" stroke-width="4" stroke-linecap="round"/>
      <text x="0" y="46" fill="#9db8ff" font-size="13">delete after</text>
    </g>
  </g>

  <!-- feed arrow down -->
  <g fill="none" stroke="#FF4D6D" stroke-opacity="0.6" stroke-width="3" stroke-dasharray="5 7" stroke-linecap="round"><path d="M600 192 V236"/></g>
  <polygon points="600,250 592,236 608,236" fill="#FF4D6D"/>

  <!-- normal library (front) -->
  <g font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">
    <rect x="150" y="300" width="330" height="250" rx="16" fill="#0e2a5c" stroke="#3366FF" stroke-width="2"/>
    <text x="315" y="336" fill="#dbe6ff" font-size="17" font-weight="700">Document library</text>
    <g fill="#9db8ff" opacity="0.7"><rect x="185" y="360" width="260" height="12" rx="4"/><rect x="185" y="386" width="220" height="12" rx="4"/><rect x="185" y="412" width="260" height="12" rx="4"/><rect x="185" y="438" width="180" height="12" rx="4"/></g>
    <text x="315" y="500" fill="#7f97d6" font-size="14">what users see</text>
  </g>

  <!-- hidden vault door revealing PHL (behind, right) -->
  <g font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">
    <!-- vault frame -->
    <rect x="560" y="270" width="470" height="320" rx="16" fill="#120a1f" stroke="#FF4D6D" stroke-width="2.5"/>
    <!-- open door -->
    <path d="M560 270 L470 300 L470 560 L560 590 Z" fill="#1a0e2a" stroke="#FF4D6D" stroke-width="2"/>
    <circle cx="516" cy="430" r="14" fill="none" stroke="#FF4D6D" stroke-width="3"/><line x1="516" y1="430" x2="500" y2="430" stroke="#FF4D6D" stroke-width="3"/>
    <text x="800" y="308" fill="#ff9db0" font-size="17" font-weight="800">Preservation Hold Library</text>
    <!-- stuffed copies -->
    <g>
      <g fill="#2a1230" stroke="#FF4D6D" stroke-opacity="0.6" stroke-width="1.5">
        <rect x="610" y="330" width="70" height="52" rx="5"/><rect x="690" y="330" width="70" height="52" rx="5"/><rect x="770" y="330" width="70" height="52" rx="5"/><rect x="850" y="330" width="70" height="52" rx="5"/><rect x="930" y="330" width="70" height="52" rx="5"/>
        <rect x="610" y="392" width="70" height="52" rx="5"/><rect x="690" y="392" width="70" height="52" rx="5"/><rect x="770" y="392" width="70" height="52" rx="5"/><rect x="850" y="392" width="70" height="52" rx="5"/><rect x="930" y="392" width="70" height="52" rx="5"/>
        <rect x="610" y="454" width="70" height="52" rx="5"/><rect x="690" y="454" width="70" height="52" rx="5"/><rect x="770" y="454" width="70" height="52" rx="5"/><rect x="850" y="454" width="70" height="52" rx="5"/><rect x="930" y="454" width="70" height="52" rx="5"/>
      </g>
      <g fill="#FF4D6D" opacity="0.85"><circle cx="645" cy="356" r="4"/><circle cx="725" cy="356" r="4"/><circle cx="805" cy="356" r="4"/><circle cx="885" cy="418" r="4"/><circle cx="645" cy="480" r="4"/><circle cx="965" cy="480" r="4"/></g>
    </g>
    <text x="800" y="548" fill="#ff9db0" font-size="14">every deleted &amp; modified copy — counts against quota</text>
  </g>
</svg>
