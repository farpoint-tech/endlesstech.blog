<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Individual files being lifted out of a SharePoint library into an archive vault, illustrating file-level archiving">
  <defs>
    <linearGradient id="ar-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071633"/>
      <stop offset="1" stop-color="#002863"/>
    </linearGradient>
    <linearGradient id="ar-file" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eaf2ff"/>
      <stop offset="1" stop-color="#b9d0ff"/>
    </linearGradient>
    <linearGradient id="ar-vault" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e2a5c" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#00D9FF" stop-opacity="0.12"/>
    </linearGradient>
    <filter id="ar-glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="7"/></filter>
  </defs>

  <rect width="1200" height="675" fill="url(#ar-bg)"/>
  <g stroke="#3366FF" stroke-opacity="0.08" stroke-width="1">
    <path d="M0 135H1200M0 270H1200M0 405H1200M0 540H1200"/>
    <path d="M200 0V675M400 0V675M600 0V675M800 0V675M1000 0V675"/>
  </g>

  <!-- SharePoint document library (left) -->
  <g transform="translate(150 250)">
    <path d="M0 30 Q0 10 20 10 H70 L90 30 H210 Q230 30 230 50 V200 Q230 220 210 220 H20 Q0 220 0 200 Z" fill="#0e2a5c" stroke="#3366FF" stroke-width="2"/>
    <rect x="26" y="60" width="120" height="14" rx="4" fill="#00D9FF" opacity="0.8"/>
    <rect x="26" y="90" width="178" height="10" rx="3" fill="#9db8ff" opacity="0.5"/>
    <rect x="26" y="112" width="150" height="10" rx="3" fill="#9db8ff" opacity="0.4"/>
    <rect x="26" y="134" width="178" height="10" rx="3" fill="#9db8ff" opacity="0.5"/>
    <rect x="26" y="156" width="110" height="10" rx="3" fill="#9db8ff" opacity="0.35"/>
  </g>
  <text x="265" y="510" fill="#9db8ff" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600" text-anchor="middle">SharePoint Library</text>

  <!-- flight path arrows -->
  <g fill="none" stroke="#00D9FF" stroke-opacity="0.5" stroke-width="2.5" stroke-dasharray="6 8" stroke-linecap="round">
    <path d="M410 300 C 560 200, 700 200, 840 250"/>
    <path d="M410 330 C 560 320, 700 340, 840 330"/>
    <path d="M410 360 C 560 440, 700 440, 840 410"/>
  </g>

  <!-- individual files in transit -->
  <g font-family="Segoe UI, Arial, sans-serif">
    <g transform="translate(520 200) rotate(-8)">
      <path d="M0 0 H40 L54 14 V70 H0 Z" fill="url(#ar-file)"/><path d="M40 0 V14 H54 Z" fill="#8fb0ee"/>
      <rect x="8" y="26" width="34" height="5" rx="2" fill="#3366FF" opacity="0.6"/><rect x="8" y="38" width="26" height="5" rx="2" fill="#3366FF" opacity="0.4"/>
    </g>
    <g transform="translate(560 330) rotate(6)">
      <path d="M0 0 H40 L54 14 V70 H0 Z" fill="url(#ar-file)"/><path d="M40 0 V14 H54 Z" fill="#8fb0ee"/>
      <rect x="8" y="26" width="34" height="5" rx="2" fill="#3366FF" opacity="0.6"/><rect x="8" y="38" width="26" height="5" rx="2" fill="#3366FF" opacity="0.4"/>
    </g>

    <!-- highlighted "file-level" file with zoom ring -->
    <g transform="translate(600 430)">
      <circle cx="27" cy="35" r="60" fill="#ECC23B" fill-opacity="0.14" filter="url(#ar-glow)"/>
      <circle cx="27" cy="35" r="52" fill="none" stroke="#ECC23B" stroke-width="3"/>
      <g transform="rotate(-4)">
        <path d="M0 0 H40 L54 14 V70 H0 Z" fill="url(#ar-file)"/><path d="M40 0 V14 H54 Z" fill="#8fb0ee"/>
        <rect x="8" y="26" width="34" height="5" rx="2" fill="#3366FF" opacity="0.7"/><rect x="8" y="38" width="26" height="5" rx="2" fill="#3366FF" opacity="0.5"/>
      </g>
      <text x="27" y="112" fill="#ECC23B" font-size="16" font-weight="700" text-anchor="middle" letter-spacing="0.5">FILE-LEVEL</text>
    </g>
  </g>

  <!-- archive vault (right) -->
  <g transform="translate(840 210)">
    <rect x="0" y="0" width="240" height="250" rx="18" fill="url(#ar-vault)" stroke="#00D9FF" stroke-width="2"/>
    <rect x="0" y="0" width="240" height="54" rx="18" fill="#00D9FF" fill-opacity="0.16"/>
    <!-- lock -->
    <g transform="translate(120 130)">
      <rect x="-26" y="0" width="52" height="42" rx="8" fill="#00D9FF" opacity="0.9"/>
      <path d="M-16 0 V-12 a16 16 0 0 1 32 0 V0" fill="none" stroke="#00D9FF" stroke-width="6"/>
      <circle cx="0" cy="18" r="6" fill="#002863"/><rect x="-3" y="18" width="6" height="12" rx="3" fill="#002863"/>
    </g>
    <text x="120" y="228" fill="#eaf2ff" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle" letter-spacing="1">ARCHIVE</text>
  </g>
</svg>
